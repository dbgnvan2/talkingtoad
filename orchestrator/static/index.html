<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkingToad Orchestrator</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --panel-bg: #ffffff;
            --accent-color: #2e7d32;
            --text-color: #333;
            --system-msg: #e8f5e9;
            --user-msg: #f5f5f5;
            
            /* Role Colors */
            --architect-bg: #e3f2fd; /* Blue */
            --snr-dev-bg: #fff9c4;   /* Yellow */
            --dev-bg: #fce4ec;       /* Pink */
            --qa-bg: #f3e5f5;        /* Purple Light */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 320px;
            min-width: 200px;
            max-width: 600px;
            background-color: var(--panel-bg);
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
            flex-shrink: 0;
            overflow-x: hidden;
        }

        #resizer {
            width: 8px;
            cursor: col-resize;
            background-color: transparent;
            transition: background-color 0.2s;
            flex-shrink: 0;
            z-index: 10;
            margin-right: -4px;
            margin-left: -4px;
        }

        #resizer:hover, #resizer.resizing {
            background-color: rgba(46, 125, 50, 0.2);
        }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
            min-width: 0;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 90%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            position: relative;
        }

        .role-user { align-self: flex-end; background-color: var(--user-msg); border-bottom-right-radius: 0; }
        .role-system { align-self: flex-start; background-color: var(--system-msg); font-style: italic; border-left: 4px solid #4caf50; font-family: monospace; font-size: 12px; }
        
        .role-architect { align-self: flex-start; background-color: var(--architect-bg); border-bottom-left-radius: 0; border-left: 5px solid #2196f3; }
        .role-snr_dev { align-self: flex-start; background-color: var(--snr-dev-bg); border-bottom-left-radius: 0; border-left: 5px solid #fbc02d; }
        .role-dev { align-self: flex-start; background-color: var(--dev-bg); border-bottom-left-radius: 0; border-left: 5px solid #e91e63; }
        .role-qa { align-self: flex-start; background-color: var(--qa-bg); border-bottom-left-radius: 0; border-left: 5px solid #9c27b0; }

        .role-label {
            display: block;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .role-info-card {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 11px;
        }

        #input-area {
            padding: 20px;
            background-color: var(--panel-bg);
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background-color: #1b5e20; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            background-color: #eee;
        }

        .phase-IDLE { background-color: #e0e0e0; }
        .phase-ARCHITECT_SPEC { background-color: #bbdefb; color: #0d47a1; }
        .phase-SNR_SPEC_REVIEW { background-color: #fff9c4; color: #f57f17; }
        .phase-QA_SPEC_REVIEW { background-color: #f3e5f5; color: #7b1fa2; border: 1px solid #9c27b0; }
        .phase-DEV_SPEC_REVIEW { background-color: #fce4ec; color: #880e4f; }
        .phase-IMPLEMENTATION { background-color: #c8e6c9; color: #1b5e20; }
        .phase-SNR_IMPL_REVIEW { background-color: #fff9c4; color: #f57f17; }
        .phase-QA_VERIFY { background-color: #f3e5f5; color: #7b1fa2; border: 1px solid #9c27b0; }
        .phase-ARCHITECT_UPDATE { background-color: #bbdefb; color: #0d47a1; }
        .phase-GIT_PUBLISH { background-color: #f3e5f5; color: #7b1fa2; font-weight: bold; }

        h2 { margin-top: 0; font-size: 18px; white-space: nowrap; }
        .meta { font-size: 12px; color: #666; margin-bottom: 20px; white-space: nowrap; }
        #reset-btn { margin-top: auto; background-color: #f44336; font-size: 12px; flex-shrink: 0; }
        #rerun-btn { background-color: var(--accent-color); margin-bottom: 10px; font-size: 12px; flex-shrink: 0; }
        
        .provider-row {
            margin-bottom: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .provider-row label { font-weight: bold; color: #555; }
        .provider-row select { width: 100%; padding: 4px; font-size: 11px; }

        #active-goal {
            cursor: pointer;
            transition: background 0.2s;
        }
        #active-goal:hover { background: #eee !important; }
        #active-goal:active { background: #ddd !important; }

        #progress-log {
            font-size: 10px;
            font-family: monospace;
            color: #666;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>Orchestrator</h2>
        <div class="meta">Multi-Role SDLC Factory</div>
        
        <div class="role-info-card">
            <div style="font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid #ddd; padding-bottom: 4px; color: #333;">ROLE CONFIGURATION</div>
            
            <div class="provider-row">
                <label>Architect:</label>
                <select id="prov-architect">
                    <option value="gemini">Gemini (3.0 Pro)</option>
                    <option value="openai">OpenAI (GPT-4o)</option>
                    <option value="deepseek">DeepSeek (Chat)</option>
                    <option value="local">Local (Ollama)</option>
                </select>
            </div>

            <div class="provider-row">
                <label>Snr Developer:</label>
                <select id="prov-snr_dev">
                    <option value="gemini">Gemini (3.0 Pro)</option>
                    <option value="openai">OpenAI (GPT-4o)</option>
                    <option value="deepseek" selected>DeepSeek (Chat)</option>
                    <option value="local">Local (Ollama)</option>
                </select>
            </div>

            <div class="provider-row">
                <label>QA Sentinel:</label>
                <select id="prov-qa">
                    <option value="gemini">Gemini (3.0 Pro)</option>
                    <option value="openai">OpenAI (GPT-4o)</option>
                    <option value="deepseek" selected>DeepSeek (Chat)</option>
                    <option value="local">Local (Ollama)</option>
                </select>
            </div>

            <div style="font-size: 10px; margin-top: 5px; color: #777;">
                <strong>Developer:</strong> Claude Code
            </div>
        </div>

        <div style="margin-bottom: 15px;">
            <strong>System Status:</strong><br>
            <span id="phase-badge" class="status-badge phase-IDLE">IDLE</span>
        </div>

        <div style="margin-bottom: 15px;">
            <strong>Active Goal (Click to Copy):</strong><br>
            <div id="active-goal" style="font-size: 11px; margin-top: 5px; color: #555; background: #f9f9f9; padding: 8px; border-radius: 4px; border: 1px solid #eee; overflow-wrap: break-word;">None</div>
        </div>

        <div style="flex: 1; overflow-y: auto; margin-bottom: 15px; border-top: 1px solid #eee; padding-top: 10px;">
            <strong>Event Log:</strong><br>
            <div id="progress-log"></div>
        </div>

        <button id="rerun-btn">Refresh & Re-run</button>
        <button id="reset-btn">Reset Orchestrator</button>
    </div>

    <div id="resizer"></div>

    <div id="main">
        <div id="chat-window"></div>
        <div id="input-area">
            <input type="text" id="chat-input" placeholder="Enter your goal...">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const phaseBadge = document.getElementById('phase-badge');
        const activeGoal = document.getElementById('active-goal');
        const resetBtn = document.getElementById('reset-btn');
        const rerunBtn = document.getElementById('rerun-btn');
        const progressLog = document.getElementById('progress-log');
        
        const provArchitect = document.getElementById('prov-architect');
        const provSnrDev = document.getElementById('prov-snr_dev');
        const provQA = document.getElementById('prov-qa');

        const sidebar = document.getElementById('sidebar');
        const resizer = document.getElementById('resizer');

        let lastHistoryLength = 0;
        let lastEventCount = 0;
        let isFirstLoad = true;

        let isResizing = false;
        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            resizer.classList.add('resizing');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
        });
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const newWidth = e.clientX;
            if (newWidth > 200 && newWidth < 600) sidebar.style.width = `${newWidth}px`;
        });
        document.addEventListener('mouseup', () => {
            isResizing = false;
            resizer.classList.remove('resizing');
            document.body.style.cursor = 'default';
            document.body.style.userSelect = 'auto';
        });

        activeGoal.onclick = () => {
            const text = activeGoal.textContent;
            if (text === 'None') return;
            navigator.clipboard.writeText(text);
            const originalText = activeGoal.textContent;
            activeGoal.textContent = 'COPIED!';
            setTimeout(() => activeGoal.textContent = originalText, 1000);
        };

        async function fetchState() {
            try {
                const response = await fetch('/api/state');
                const state = await response.json();
                
                phaseBadge.textContent = state.phase.replace(/_/g, ' ');
                phaseBadge.className = `status-badge phase-${state.phase}`;
                activeGoal.textContent = state.goal || 'None';

                if (isFirstLoad && state.providers) {
                    provArchitect.value = state.providers.architect;
                    provSnrDev.value = state.providers.snr_dev;
                    provQA.value = state.providers.qa;
                    isFirstLoad = false;
                }

                if (state.chat_history.length !== lastHistoryLength) {
                    renderHistory(state.chat_history);
                    lastHistoryLength = state.chat_history.length;
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }

                if (state.event_log && state.event_log.length !== lastEventCount) {
                    renderProgressLog(state.event_log);
                    lastEventCount = state.event_log.length;
                    const logContainer = progressLog.parentElement;
                    logContainer.scrollTop = logContainer.scrollHeight;
                }

                const isBusy = state.phase !== 'IDLE' && state.phase !== 'IMPLEMENTATION' && state.phase !== 'QA_VERIFY' && state.phase !== 'GIT_PUBLISH';
                chatInput.disabled = isBusy;
                sendBtn.disabled = isBusy;
                if (isBusy) {
                    chatInput.placeholder = `Processing (${state.phase})...`;
                } else {
                    chatInput.placeholder = state.phase === 'IDLE' ? "Enter your goal..." : "Awaiting implementation results...";
                }

            } catch (err) {
                console.error('Failed to fetch state:', err);
            }
        }

        function renderProgressLog(log) {
            progressLog.innerHTML = '';
            log.forEach(entry => {
                const div = document.createElement('div');
                const time = new Date(entry.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                div.textContent = `[${time}] ${entry.message}`;
                progressLog.appendChild(div);
            });
        }

        const roleDisplayNames = {
            'architect': 'Architect',
            'snr_dev': 'Senior Developer',
            'dev': 'Developer',
            'qa': 'QA Sentinel',
            'system': 'System',
            'user': 'User'
        };

        function renderHistory(history) {
            chatWindow.innerHTML = '';
            history.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message role-${msg.role}`;
                
                const label = document.createElement('span');
                label.className = 'role-label';
                label.textContent = roleDisplayNames[msg.role] || msg.role.toUpperCase();
                div.appendChild(label);

                const contentSpan = document.createElement('span');
                let content = msg.content
                    .replace(/```[a-z]*\n([\s\S]*?)```/g, '<pre style="background:#333;color:#eee;padding:10px;border-radius:4px;overflow-x:auto;margin-top:10px;">$1</pre>')
                contentSpan.innerHTML = content;
                div.appendChild(contentSpan);
                
                chatWindow.appendChild(div);
            });
        }

        async function sendMessage() {
            const msg = chatInput.value.trim();
            if (!msg) return;
            
            const providers = {
                architect: provArchitect.value,
                snr_dev: provSnrDev.value,
                qa: provQA.value
            };

            chatInput.value = '';
            try {
                await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, providers: providers })
                });
                fetchState();
            } catch (err) {
                console.error('Failed to send message:', err);
            }
        }

        sendBtn.onclick = sendMessage;
        chatInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

        rerunBtn.onclick = async () => {
            if (activeGoal.textContent === 'None') return;
            rerunBtn.textContent = 'Resetting Cycle...';
            rerunBtn.disabled = true;
            lastHistoryLength = 0;
            lastEventCount = 0;
            chatWindow.innerHTML = '';
            progressLog.innerHTML = '';
            await fetch('/api/rerun', { method: 'POST' });
            setTimeout(() => {
                rerunBtn.textContent = 'Refresh & Re-run';
                rerunBtn.disabled = false;
                fetchState();
            }, 1000);
        };

        resetBtn.onclick = async () => {
            if (confirm('Reset orchestrator state?')) {
                await fetch('/api/reset', { method: 'POST' });
                lastHistoryLength = 0;
                lastEventCount = 0;
                chatWindow.innerHTML = '';
                progressLog.innerHTML = '';
                fetchState();
            }
        };

        setInterval(fetchState, 1500);
        fetchState();
    </script>
</body>
</html>
