[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Skip integration tests by default. They make live LLM calls (cost + slow).
# Run with: pytest -m integration  (overrides the default exclusion)
addopts = -m "not integration"
markers =
    integration: tests that make live LLM/network calls (skipped by default; run with `pytest -m integration`)
