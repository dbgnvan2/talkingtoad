# TalkingToad — Feature Inventory
# Auto-generated from codebase scan (2026-07-07).
# Source of truth: shipped code in api/crawler/checkers/, api/routers/, api/services/, frontend/
# Each feature lists: what it does, what issue codes support it, status (shipped/partial/planned)

# ──────────────────────────────────────────
# DOMAIN: Crawl Engine
# ──────────────────────────────────────────
crawl_engine:
  description: "Async BFS web crawler — discovers pages, fetches HTML, parses, follows links"
  status: shipped
  endpoints:
    - "POST /api/crawl/start — submit crawl job"
    - "GET /api/crawl/{job_id}/status — poll progress"
    - "POST /api/crawl/{job_id}/cancel — cancel running crawl"
    - "GET /api/crawl/{job_id}/pages — list crawled pages"
    - "GET /api/crawl/{job_id}/pages/issues — issues per page"
    - "POST /api/crawl/{job_id}/rescan-url — re-fetch single page"
    - "POST /api/crawl/scan-page — single-page job"
  details:
    - "BFS crawl with configurable depth, page limit, concurrency"
    - "Robots.txt parsing and respect"
    - "XML sitemap discovery and parsing"
    - "URL normalization and deduplication"
    - "SSRF safety checks on URLs"
    - "HTTP header + HTML meta robots extraction"
    - "Crawl comparison across runs"

crawl_engine_wp_integration:
  description: "Crawl-aware WordPress site detection and noise filtering"
  status: shipped
  details:
    - "WordPress noise URL detection (wp-json, wp-admin, etc.)"
    - "WP-specific page type detection (posts, pages, categories)"

# ──────────────────────────────────────────
# DOMAIN: Issue Detection (152 codes)
# ──────────────────────────────────────────
issues_detection:
  description: "152 issue codes across 13 categories, each with impact/effort scoring"
  status: shipped
  categories:

    metadata:
      description: "Title, meta description, Open Graph, Twitter Card, canonical, favicon, lang"
      status: shipped
      codes:
        - TITLE_MISSING, TITLE_DUPLICATE, TITLE_TOO_SHORT, TITLE_TOO_LONG
        - META_DESC_MISSING, META_DESC_DUPLICATE, META_DESC_TOO_SHORT, META_DESC_TOO_LONG
        - SOCIAL_PREVIEW_METADATA_MISSING  # §7 merge of OG_* + TWITTER_CARD
        - CANONICAL_MISSING, CANONICAL_EXTERNAL, CANONICAL_SELF_MISSING
        - FAVICON_MISSING, LANG_MISSING
        - TITLE_H1_MISMATCH  # (§7 deleted: TITLE_META_DUPLICATE_PAIR, SCHEMA_MISSING)
        - LINK_EMPTY_ANCHOR, ANCHOR_TEXT_GENERIC

    headings:
      description: "H1 presence, count, level skipping, empty headings"
      status: shipped
      codes:
        - H1_MISSING, H1_MULTIPLE, HEADING_SKIP, HEADING_EMPTY

    broken_links:
      description: "HTTP status-based broken link detection, placeholder links"
      status: shipped
      codes:
        - BROKEN_LINK_404, BROKEN_LINK_410, BROKEN_LINK_5XX, BROKEN_LINK_503
        - EXTERNAL_LINK_SKIPPED, EXTERNAL_LINK_TIMEOUT
        - PLACEHOLDER_LINK, WRONG_PLACEHOLDER_LINK

    redirects:
      description: "Redirect loop, chain, 301/302, trailing slash, case normalisation"
      status: shipped
      codes:
        - REDIRECT_LOOP, REDIRECT_CHAIN, REDIRECT_301, REDIRECT_302
        - REDIRECT_TRAILING_SLASH, REDIRECT_CASE_NORMALISE
        - META_REFRESH_REDIRECT, INTERNAL_REDIRECT_301

    crawlability:
      description: "Robots.txt, noindex, sitemap, thin content, crawl depth, orphan pages"
      status: shipped
      codes:
        - PAGE_TIMEOUT, LOGIN_REDIRECT, ROBOTS_BLOCKED, NOINDEX_META, NOINDEX_HEADER
        - NOT_IN_SITEMAP, PDF_TOO_LARGE, PAGINATION_LINKS_PRESENT
        - THIN_CONTENT, HIGH_CRAWL_DEPTH, ORPHAN_PAGE
        - CONTENT_STALE, MISSING_VIEWPORT_META, INTERNAL_NOFOLLOW
        - PAGE_SIZE_LARGE, PARA_TOO_LONG, AMPHTML_BROKEN

    security:
      description: "HTTP, mixed content, HSTS, cross-origin links, www canonicalisation"
      status: shipped
      codes:
        - HTTP_PAGE, MIXED_CONTENT, MISSING_HSTS, UNSAFE_CROSS_ORIGIN_LINK
        - WWW_CANONICALIZATION, HTTPS_REDIRECT_MISSING

    url_structure:
      description: "URL hygiene — uppercase, spaces, underscores, length"
      status: shipped
      codes:
        - URL_UPPERCASE, URL_HAS_SPACES, URL_HAS_UNDERSCORES, URL_TOO_LONG

    images:
      description: "Alt text quality, file size, compression, format, srcset, broken images"
      status: shipped
      codes:
        - IMG_OVERSIZED, IMG_ALT_MISSING, IMG_ALT_TOO_SHORT, IMG_ALT_TOO_LONG
        - IMG_ALT_GENERIC, IMG_ALT_DUP_FILENAME, IMG_ALT_MISUSED
        - IMG_SLOW_LOAD, IMG_OVERSCALED, IMG_POOR_COMPRESSION
        - IMG_FORMAT_LEGACY, IMG_NO_SRCSET, IMG_DUPLICATE_CONTENT, IMG_BROKEN

    rendering:
      description: "JS-dependent navigation detection"
      status: shipped
      codes:
        - JS_DEPENDENT_NAVIGATION

    semantic_html:
      description: "Non-semantic buttons, missing landmarks, accessible names"
      status: shipped
      codes:
        - NON_SEMANTIC_BUTTON, LANDMARK_MAIN_MISSING
        - LANDMARK_NAV_MISSING, INTERACTIVE_NO_ACCESSIBLE_NAME

    ai_readiness:
      description: "68 codes — AI bot access, content extractability, citations, GEO signals, schema, freshness"
      status: shipped
      codes:
        - AI_BOT_BLANKET_DISALLOW, AI_BOT_DEPRECATED_DIRECTIVE, AI_BOT_NO_AI_DIRECTIVES
        - AI_BOT_SEARCH_BLOCKED, AI_BOT_TABLE_STALE, AI_BOT_TRAINING_DISALLOWED
        - AI_BOT_USER_FETCH_BLOCKED
        - AI_CITED_PAGE, AI_CONTENT_NOT_IN_TEXT, AI_HIGH_VALUE_UNCITED
        - AI_MAIN_CONTENT_LOW_RATIO, AI_NO_VISUAL_COMPANION
        - AI_PREVIEW_BLOCKED_AT_BOT, AI_PREVIEW_SUPPRESSED
        - AI_TXT_MISSING
        - CONTENT_CLOAKING_DETECTED, CONTENT_DATE_STALE_VISIBLE
        - CONTENT_IMAGE_HEAVY, CONTENT_NOT_EXTRACTABLE_NO_TEXT
        - CONTENT_STAT_OUTDATED, CONTENT_THIN, CONTENT_UNSTRUCTURED
        - AUTHOR_BYLINE_MISSING, BLOG_SECTIONS_MISSING
        - CENTRAL_CLAIM_BURIED, CHUNKS_NOT_SELF_CONTAINED
        - CITATIONS_MISSING_SUBSTANTIAL_CONTENT, CITATIONS_ORPHANED
