# ──────────────────────────────────────────
# DOMAIN: WordPress Fix Operations
# ──────────────────────────────────────────
wp_fixes:
  description: "End-to-end fix pipeline — generate proposals, approve, apply to WordPress via REST API"
  status: shipped
  subdomains:

    title_fixes:
      description: "Bulk title trimming (site-name suffix removal), single-page title trim"
      status: shipped
      endpoints:
        - "POST /api/fixes/bulk-trim-titles"
        - "POST /api/fixes/trim-title-one"
      fixable_codes: TITLE_TOO_LONG, TITLE_DUPLICATE

    heading_fixes:
      description: "Change heading level, change heading text, H-to-bold conversion, bulk heading level change"
      status: shipped
      endpoints:
        - "POST /api/fixes/change-heading-level"
        - "POST /api/fixes/change-heading-text"
        - "POST /api/fixes/bulk-replace-heading"
        - "POST /api/fixes/heading-to-bold"
        - "GET /api/fixes/find-heading"
        - "GET /api/fixes/analyze-heading-sources"
      fixable_codes: H1_MULTIPLE, HEADING_SKIP, HEADING_EMPTY

    image_fixes:
      description: "Alt/title/caption/description update, WebP optimization, GEO metadata (GPS EXIF), SEO filename rename, batch optimization"
      status: shipped
      endpoints:
        - "POST /api/fixes/update-image-meta"
        - "POST /api/fixes/optimize-image"
        - "POST /api/fixes/optimize-existing-preview"
        - "POST /api/fixes/optimize-existing"
        - "POST /api/fixes/optimize-upload-preview"
        - "POST /api/fixes/optimize-upload"
        - "POST /api/fixes/batch-optimize/start"
        - "GET /api/fixes/batch-optimize/{batch_id}/status"
        - "POST /api/fixes/batch-optimize/{batch_id}/pause/resume/cancel"
        - "GET /api/fixes/batch-optimize/list"
        - "GET /api/fixes/image-info"
        - "POST /api/fixes/refresh-image-from-wp"
      fixable_codes: IMG_ALT_MISSING, IMG_ALT_TOO_SHORT, IMG_ALT_TOO_LONG, IMG_ALT_GENERIC, IMG_FORMAT_LEGACY

    link_fixes:
      description: "Replace broken links, verify re-checked links, mark links as fixed"
      status: shipped
      endpoints:
        - "POST /api/fixes/replace-link"
        - "POST /api/fixes/verify-broken-links/{job_id}"
        - "POST /api/fixes/mark-broken-link-fixed"
        - "POST /api/fixes/mark-anchor-fixed"
        - "GET /api/fixes/link-sources"
      fixable_codes: BROKEN_LINK_404, BROKEN_LINK_410, BROKEN_LINK_5XX, LINK_EMPTY_ANCHOR, PLACEHOLDER_LINK

    orphaned_media:
      description: "List WordPress media not referenced by any crawled page"
      status: shipped
      endpoints:
        - "GET /api/fixes/orphaned-media/{job_id}"

    fix_management:
      description: "Generic fix CRUD — generate proposals, approve, apply, delete"
      status: shipped
      endpoints:
        - "POST /api/fixes/generate/{job_id}"
        - "GET /api/fixes/{job_id}"
        - "PATCH /api/fixes/{fix_id}"
        - "POST /api/fixes/apply/{job_id}"
        - "DELETE /api/fixes/{job_id}"
        - "POST /api/fixes/mark-issue-fixed"
        - "POST /api/fixes/apply-one"
        - "POST /api/fixes/wp-value"

